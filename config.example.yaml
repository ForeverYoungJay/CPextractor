elsevier:
  api_key: "YOUR_ELSEVIER_API_KEY"
  inst_token: null
  crossref_mailto: null
  resolve_missing_reference_doi: true
  http_max_retries: 3

search:
  query: 'TITLE-ABS-KEY("crystal plasticity" AND (simulation OR modeling OR model))'
  count: 25
  max_pages: 20
  year_from: 2018
  year_to: null
  require_doi: true
  allowed_doctypes: ["ar", "re"]
  rank_keywords: ["crystal plasticity", "cpfe", "vpsc", "fft", "constitutive"]
  http_max_retries: 3
  dois_limit: 0

paths:
  scopus_export: "data/scopus_export"
  fulltext: "data/fulltext"

llm:
  max_snippet_chars: 600
  max_context_chars: 24000
  max_extract_retries: 2
  enable_source_enrichment: true
  prompt_version: "v2.0.0"
  schema_version: "2.0.0"
  extractor_version: "extractor_v2"
  model_select: "gpt-4.1-mini"
  model_extract: "gpt-4.1-mini"

db:
  host: "localhost"
  port: 55432
  name: "cpdb"
  user: "cpuser"
  password: "cppassword"

rag:
  embedding_model: "text-embedding-3-small"
  embedding_dim: 1536
  chunk_chars: 1200
  chunk_overlap: 200
  batch_size: 64
  embedding_max_retries: 3

pipeline:
  skip_fulltext_download: false
  prefer_local_fulltext: true
  use_local_fulltext_dois: false
  dois: []
